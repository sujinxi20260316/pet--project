name: 自动格式化代码

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'

# 修复权限问题
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-format:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装 Black
        run: |
          pip install black

      - name: 运行 Black 格式化
        run: |
          black .

      - name: 检查是否有文件被修改
        id: git-check
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 提交格式化后的代码
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "自动格式化代码 (by Black)"
          git push